# Example config for this fork (Feishu + web_cn_search + web_read).
# 本文件仅为示例，不包含真实密钥。

[channels.feishu.main-bot]
app_id = "cli_xxxxxxxxxxxxx"
app_secret = "xxxxxxxxxxxxxxxx"
base_url = "https://open.feishu.cn"
# ws_endpoint = ""  # Optional override; leave empty for bootstrap.

# Access policy
dm_policy = "open"
group_policy = "open"
mention_mode = "mention"

# Optional default model / agent
# model = "zai::glm-4.7"
# model_provider = "zai"
agent_id = "main"
allow_agent_switch = true
session_auto_archive_days = 30

[tools.web.cn_search]
enabled = true
timeout_seconds = 25

[tools.web.cn_search.metaso]
enabled = true
[[tools.web.cn_search.metaso.accounts]]
name = "main"
api_key = "YOUR_METASO_API_KEY"
enabled = true

[tools.web.cn_search.bocha]
enabled = true
[[tools.web.cn_search.bocha.accounts]]
name = "main"
api_key = "YOUR_BOCHA_API_KEY"
enabled = true

[tools.web.cn_search.anspire]
enabled = true
[[tools.web.cn_search.anspire.accounts]]
name = "main"
api_key = "YOUR_ANSPIRE_API_KEY"
enabled = true

[tools.web.cn_search.jina]
enabled = false
[[tools.web.cn_search.jina.accounts]]
name = "main"
api_key = "YOUR_JINA_API_KEY"
enabled = true

[tools.web.read]
enabled = true
min_chars = 300
cache_ttl_minutes = 15
# ssrf_allowlist = ["172.22.0.0/16"]

[tools.web.read.jina]
enabled = true
[[tools.web.read.jina.accounts]]
name = "main"
api_key = "YOUR_JINA_API_KEY"
enabled = true

[tools.web.read.metaso]
enabled = false
[[tools.web.read.metaso.accounts]]
name = "main"
api_key = "YOUR_METASO_API_KEY"
enabled = true

[tools.web.read.crawl4ai]
endpoint = ""
api_token = ""
timeout_seconds = 60

[tools.web.read.pinchtab]
endpoint = "http://127.0.0.1:9867"
token = ""
timeout_seconds = 60

# You can also set keys via environment variables:
# METASO_API_KEY, BOCHA_API_KEY, ANSPIRE_API_KEY, JINA_API_KEY
