name: Binary Release

on:
  workflow_dispatch:
    inputs:
      version:
        description: "Release version to publish (YYYYMMDD.NN)"
        required: true
        type: string
      draft:
        description: "Create the GitHub Release as a draft"
        required: false
        default: true
        type: boolean

concurrency:
  group: ${{ github.workflow }}-${{ inputs.version }}
  cancel-in-progress: false

permissions: {}

env:
  NIGHTLY_TOOLCHAIN: nightly-2025-11-30

jobs:
  validate-inputs:
    name: Validate Inputs
    runs-on: ubuntu-latest
    permissions:
      contents: read
    steps:
      - name: Validate version format
        env:
          VERSION: ${{ inputs.version }}
        run: |
          if [[ ! "$VERSION" =~ ^[0-9]{8}\.[0-9]{2}$ ]]; then
            echo "::error::Version '$VERSION' must match YYYYMMDD.NN"
            exit 1
          fi

  build-binaries:
    name: Build binary (${{ matrix.target }})
    needs: validate-inputs
    strategy:
      fail-fast: false
      matrix:
        include:
          - target: x86_64-apple-darwin
            os: macos-latest
            tailwind_asset: tailwindcss-macos-x64
          - target: aarch64-apple-darwin
            os: macos-latest
            tailwind_asset: tailwindcss-macos-arm64
          - target: x86_64-unknown-linux-gnu
            os: ubuntu-22.04
            tailwind_asset: tailwindcss-linux-x64
          - target: aarch64-unknown-linux-gnu
            os: ubuntu-24.04-arm
            tailwind_asset: tailwindcss-linux-arm64

    runs-on: ${{ matrix.os }}
    permissions:
      contents: read
    steps:
      - uses: actions/checkout@34e114876b0b11c390a56381ad16ebd13914f8d5 # v4
        with:
          persist-credentials: false

      - name: Install Rust toolchain
        uses: dtolnay/rust-toolchain@f7ccc83f9ed1e5b9c81d8a67d7ad1a747e22a561 # master
        with:
          toolchain: ${{ env.NIGHTLY_TOOLCHAIN }}
          targets: ${{ matrix.target }}, wasm32-wasip2

      - name: Build Tailwind CSS
        run: |
          ./scripts/download-tailwindcss-cli.sh "${{ matrix.tailwind_asset }}"
          cd crates/web/ui && TAILWINDCSS="../../../${{ matrix.tailwind_asset }}" ./build.sh

      - name: Build WASM components
        run: |
          cargo build --target wasm32-wasip2 -p moltis-wasm-calc -p moltis-wasm-web-fetch -p moltis-wasm-web-search --release
          cargo run -p moltis-wasm-precompile --release

      - name: Build release binary
        env:
          BUILD_TARGET: ${{ matrix.target }}
          MOLTIS_VERSION: ${{ inputs.version }}
        run: |
          cargo build --release --target "$BUILD_TARGET" --features embedded-assets,embedded-wasm

      - name: Smoke test binary
        env:
          BUILD_TARGET: ${{ matrix.target }}
        run: |
          "./target/$BUILD_TARGET/release/moltis" --version

      - name: Package standalone binary
        env:
          BUILD_TARGET: ${{ matrix.target }}
          VERSION: ${{ inputs.version }}
        run: ./scripts/package-binary-release.sh "$VERSION" "$BUILD_TARGET"

      - name: Upload packaged artifact
        uses: actions/upload-artifact@ea165f8d65b6e75b540449e92b4886f43607fa02 # v4
        with:
          name: binary-release-${{ matrix.target }}
          path: |
            dist/*.tar.gz
            dist/*.sha256
          if-no-files-found: error

  publish-release:
    name: Publish GitHub Release
    needs: build-binaries
    runs-on: ubuntu-latest
    permissions:
      contents: write
    steps:
      - name: Download packaged artifacts
        uses: actions/download-artifact@d3f86a106a0bac45b974a628896c90dbdf5c8093 # v4
        with:
          path: dist
          pattern: binary-release-*
          merge-multiple: true

      - name: Create or update release
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
          GH_REPO: ${{ github.repository }}
          VERSION: ${{ inputs.version }}
          DRAFT: ${{ inputs.draft }}
        run: |
          set -euo pipefail

          if gh release view "$VERSION" >/dev/null 2>&1; then
            gh release upload "$VERSION" dist/* --clobber
          else
            draft_flag=""
            if [[ "$DRAFT" == "true" ]]; then
              draft_flag="--draft"
            fi

            gh release create "$VERSION" \
              --target "$GITHUB_SHA" \
              --title "$VERSION" \
              --notes "Prebuilt Moltis binaries for macOS and Linux." \
              $draft_flag \
              dist/*
          fi
